
services:
  app:
    build: .
    container_name: dashboard_treinamentos_container
    ports:
      - "8501:8501"
    restart: always
    # Adicionamos o comando com as flags de liberação de acesso
    command: streamlit run app.py --server.port=8501 --server.address=0.0.0.0 --server.enableCORS=false --server.enableXsrfProtection=false